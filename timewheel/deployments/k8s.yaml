apiVersion: v1
kind: Namespace
metadata:
  name: timewheel
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: timewheel-config
  namespace: timewheel
data:
  config.yaml: |
    server:
      port: 8080
      mode: release
      read_timeout: 30s
      write_timeout: 30s
      shutdown_timeout: 10s

    mode: standalone

    timewheel:
      levels:
        high:
          interval: 100ms
          slots: 60
        normal:
          interval: 1s
          slots: 60
        low:
          interval: 10s
          slots: 60
      max_concurrent_tasks: 1000
      cache_enabled: true

    database:
      type: mysql
      mysql:
        host: mysql
        port: 3306
        username: timewheel
        password: timewheel123
        database: timewheel
        charset: utf8mb4
        max_open_conns: 100
        max_idle_conns: 10
        conn_max_lifetime: 1h

    redis:
      enabled: false
      addr: redis:6379

    logging:
      level: info
      format: json
      output:
        type: stdout
      rotation:
        max_size: 100
        max_age: 30
        max_backups: 10

    health:
      enabled: true
      live_path: /health/live
      ready_path: /health/ready

    metrics:
      enabled: true
      path: /metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timewheel
  namespace: timewheel
  labels:
    app: timewheel
spec:
  replicas: 2
  selector:
    matchLabels:
      app: timewheel
  template:
    metadata:
      labels:
        app: timewheel
    spec:
      containers:
        - name: timewheel
          image: timewheel:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /app/configs
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: timewheel-config
---
apiVersion: v1
kind: Service
metadata:
  name: timewheel
  namespace: timewheel
spec:
  selector:
    app: timewheel
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: timewheel
  namespace: timewheel
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: timewheel.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: timewheel
                port:
                  number: 8080
