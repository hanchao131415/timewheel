version: '3.8'

services:
  timewheel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timewheel
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/app/configs:ro
      - timewheel-data:/app/data
      - timewheel-logs:/app/logs
    environment:
      - TIMEWHEEL_SERVER_PORT=8080
      - TIMEWHEEL_DATABASE_TYPE=sqlite
      - TIMEWHEEL_DATABASE_SQLITE_PATH=/app/data/timewheel.db
      - TIMEWHEEL_LOGGING_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - timewheel-network

  # MySQL (可选)
  mysql:
    image: mysql:8.0
    container_name: timewheel-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: timewheel
      MYSQL_USER: timewheel
      MYSQL_PASSWORD: timewheel123
    volumes:
      - mysql-data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - timewheel-network
    profiles:
      - mysql

  # Redis (集群模式)
  redis:
    image: redis:7-alpine
    container_name: timewheel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - timewheel-network
    profiles:
      - cluster

volumes:
  timewheel-data:
  timewheel-logs:
  mysql-data:
  redis-data:

networks:
  timewheel-network:
    driver: bridge
